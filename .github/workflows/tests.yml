name: CI — All Baselines

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-semantic-mvp:
    name: Semantic MVP (RDF/OWL/SHACL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e .
        working-directory: semantic-mvp
      - name: Run tests
        run: pytest tests/ -q
        working-directory: semantic-mvp

  test-opa-set:
    name: OPA-set Baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e .
        working-directory: opa-set-baseline
      - name: Run tests
        run: pytest tests/ -q
        working-directory: opa-set-baseline

  test-opa-derived:
    name: OPA-derived Baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e .
        working-directory: opa-derived-baseline
      - name: Run tests
        run: pytest tests/ -q
        working-directory: opa-derived-baseline

  run-experiments:
    name: Run Benchmark Experiments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install all baselines in editable mode
        run: |
          pip install -e semantic-mvp/
          pip install -e opa-set-baseline/
          pip install -e opa-derived-baseline/
      - name: Run decision accuracy experiment
        run: python experiments/run_all_experiments.py
      - name: Run maintainability experiment
        run: python experiments/maintainability.py
      - name: Run explanation quality experiment
        run: python experiments/explanation_quality.py
      - name: Run latency benchmark (1 iteration for quick sanity check in CI)
        run: python experiments/latency.py --iterations 1
      - name: Run table generator
        run: python experiments/generate_tables.py
